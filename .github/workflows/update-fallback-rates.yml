name: Update fallback rates

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update fallback data
        shell: pwsh
        run: ./.github/scripts/update-fallback.ps1

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Src/CurrencyCalculator.Web/wwwroot/fallback/latest-rates.json
          git diff --cached --quiet || git commit -m "chore: update fallback exchange rates"
          git push
