name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Src/CurrencyCalculator.slnx

      - name: Publish
        run: dotnet publish Src/CurrencyCalculator.Web/CurrencyCalculator.Web.csproj -c Release -o publish

      # ── GitHub Pages: <base href> must match the repository subpath ──
      # For a repo named "CurrencyCalculator" hosted at username.github.io/CurrencyCalculator/
      # we must rewrite <base href="/"> to <base href="/CurrencyCalculator/">.
      # If we're inside a *.github.io repo (root), the subpath stays "/".
      - name: Rewrite base href for GitHub Pages subpath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "Repository name: $REPO_NAME"
          # If this is NOT a *.github.io repo, we need to add the subpath
          if [[ "$REPO_NAME" != *.github.io ]]; then
            echo "Rewriting base href to /$REPO_NAME/"
            sed -i "s|<base href=\"/\"|<base href=\"/$REPO_NAME/\"|g" publish/wwwroot/index.html
          else
            echo "Root Pages repo detected — base href stays as /"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
