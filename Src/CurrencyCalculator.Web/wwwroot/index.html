<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <title>Currency Calculator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CurrencyCalculator.Web.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        // Apply theme before first paint to prevent flash
        (function () {
            var stored = localStorage.getItem('cc.theme.v1');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var dark = stored ? stored === 'dark' : prefersDark;
            document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
        })();
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Toast container -->
    <div id="cc-toast-container" class="cc-toast-container"></div>

    <script>
        // localStorage helpers
        window.ccStorage = {
            get: (key) => window.localStorage.getItem(key),
            set: (key, value) => window.localStorage.setItem(key, value),
            remove: (key) => window.localStorage.removeItem(key)
        };

        // Browser helpers
        window.ccBrowser = {
            getLanguage: () => navigator.language || "en-US"
        };

        // Theme helpers
        window.ccTheme = {
            get: () => document.documentElement.getAttribute('data-bs-theme') || 'light',
            set: (theme) => {
                document.documentElement.setAttribute('data-bs-theme', theme);
                localStorage.setItem('cc.theme.v1', theme);
            },
            isDark: () => document.documentElement.getAttribute('data-bs-theme') === 'dark'
        };

        // Toast helper (pure CSS, no Bootstrap JS)
        window.ccToast = {
            show: (message, durationMs) => {
                var container = document.getElementById('cc-toast-container');
                var el = document.createElement('div');
                el.className = 'cc-toast';
                el.textContent = message;
                container.appendChild(el);
                requestAnimationFrame(() => el.classList.add('show'));
                setTimeout(() => {
                    el.classList.remove('show');
                    el.addEventListener('transitionend', () => el.remove());
                }, durationMs || 3000);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
